<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orionis AI · 2.0 Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;overflow:hidden;background:#0a0a0a}

/* ═══════════════════════════════════════
   THÈMES NÉON
═══════════════════════════════════════ */
body.orionis{
  --primary:#00e5ff;--accent:#c400ff;--secondary:#ff006e;--light:#00ffa3;
  --bg:#06080f;--surface:rgba(0,229,255,.05);--border:rgba(0,229,255,.25);
}
body.techno{
  --primary:#ff2020;--accent:#ff6b00;--secondary:#ff0080;--light:#ff4444;
  --bg:#0d0005;--surface:rgba(255,32,32,.05);--border:rgba(255,32,32,.25);
}
body.activites{
  --primary:#39d98a;--accent:#f0a500;--secondary:#7ecb5f;--light:#a8e063;
  --bg:#050f07;--surface:rgba(57,217,138,.05);--border:rgba(57,217,138,.25);
}
body.imaginary{
  --primary:#f59e0b;--accent:#f97316;--secondary:#ef4444;--light:#fbbf24;
  --bg:#06080f;--surface:rgba(245,158,11,.05);--border:rgba(245,158,11,.25);
}

/* Thème actif */
body{
  background:var(--bg);color:#eef2ff;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(0,229,255,.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(196,0,255,.04) 0%, transparent 50%);
  background-attachment:fixed;
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
html,body{height:100%}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:900px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%;height:100vh}

/* Header */
header{display:flex;align-items:center;gap:16px;padding:16px 24px;
  border-bottom:1px solid var(--border);background:rgba(10,10,10,.85);backdrop-filter:blur(20px);
  flex-shrink:0;z-index:10}

.logo{width:32px;height:32px;border-radius:50%;background:#080808;
  box-shadow:0 0 0 2px var(--primary),0 0 16px var(--primary);
  animation:pulse 2s ease-in-out infinite;position:relative;overflow:hidden}
.logo::before{content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid transparent;border-top-color:var(--primary);animation:spin 3s linear infinite}

.brand{display:flex;flex-direction:column;gap:2px}
.brand-name{font-size:.95rem;font-weight:700;
  background:linear-gradient(90deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-desc{font-size:.65rem;color:rgba(238,242,255,.5)}

.studio{margin-left:auto;font-size:.7rem;color:var(--primary);opacity:.8;letter-spacing:.08em;font-weight:600}

.model-select{background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;font-size:.72rem;color:var(--primary);
  cursor:pointer;outline:none;transition:all .25s;font-family:inherit}
.model-select:hover{border-color:var(--primary);box-shadow:0 0 12px var(--primary)}

.status{display:flex;align-items:center;gap:6px;font-size:.68rem;color:rgba(238,242,255,.6)}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--light);
  box-shadow:0 0 10px var(--light);animation:blink 2s ease-in-out infinite}

/* Messages */
#msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Welcome */
.welcome{text-align:center;display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex:1;gap:16px;padding:40px 20px;
  animation:fadeIn .5s ease}
.welcome-logo{width:80px;height:80px;border-radius:50%;background:#080808;
  box-shadow:0 0 0 3px var(--primary),0 0 30px var(--primary);
  animation:float 4s ease-in-out infinite}
.welcome h2{font-size:1.4rem;font-weight:700;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{font-size:.9rem;color:rgba(238,242,255,.7);max-width:380px;line-height:1.8}
.welcome-line{font-size:.85rem;color:var(--primary);font-style:italic;
  border-left:2px solid var(--primary);padding-left:12px;
  text-align:left;max-width:360px;margin:4px auto}

.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.chip{padding:7px 16px;border:1px solid var(--border);border-radius:20px;
  font-size:.76rem;color:var(--primary);cursor:pointer;background:transparent;
  transition:all .2s}
.chip:hover{background:var(--surface);border-color:var(--primary);
  box-shadow:0 0 12px var(--primary)}

/* Messages */
.msg{display:flex;gap:12px;max-width:85%;animation:slideIn .3s ease;margin-bottom:4px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}

.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;
  background:#080808}
.msg.ai .avatar{box-shadow:0 0 0 1.5px var(--primary),0 0 12px var(--primary)}
.msg.user .avatar{background:linear-gradient(135deg,var(--primary),var(--accent));color:#000}

.bubble{padding:14px 18px;border-radius:14px;font-size:.88rem;line-height:1.85;
  word-break:break-word;transition:all .3s}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border);
  border-top-left-radius:4px;color:#eef2ff}
.msg.user .bubble{background:rgba(0,229,255,.1);border:1px solid var(--border);
  border-top-right-radius:4px;color:#eef2ff}

/* Thinking animation */
.thinking{display:flex;gap:6px;align-items:center;padding:12px 18px;
  font-size:.82rem;color:var(--primary);font-style:italic}
.think-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);
  animation:bounce 1s ease-in-out infinite}
.think-dot:nth-child(2){animation-delay:.15s}
.think-dot:nth-child(3){animation-delay:.3s}

/* Input */
#input-area{padding:16px 24px;border-top:1px solid var(--border);
  background:rgba(10,10,10,.9);backdrop-filter:blur(20px);flex-shrink:0}
.input-row{display:flex;gap:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;padding:12px 16px;
  transition:border-color .25s}
.input-row:focus-within{border-color:var(--primary);box-shadow:0 0 20px var(--primary)/0.15}
#inp{flex:1;background:transparent;border:none;outline:none;color:#eef2ff;
  font-family:inherit;font-size:.88rem;resize:none;max-height:120px;min-height:24px}
#inp::placeholder{color:rgba(238,242,255,.4)}
#send{width:36px;height:36px;border:none;border-radius:10px;background:var(--primary);
  color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:700;transition:all .2s;flex-shrink:0;
  box-shadow:0 0 16px var(--primary)/0.4}
#send:hover:not(:disabled){transform:scale(1.1);box-shadow:0 0 24px var(--primary)/0.6}
#send:disabled{opacity:.4;cursor:not-allowed}

.input-footer{text-align:center;font-size:.62rem;color:rgba(238,242,255,.4);margin-top:8px}

/* ═══════════════════════════════════════
   MARKDOWN
═══════════════════════════════════════ */
.bubble h1,.bubble h2,.bubble h3{color:var(--primary);font-weight:700;margin:12px 0 6px;font-size:1em}
.bubble h2{font-size:.95em}
.bubble h3{font-size:.9em}
.bubble strong{color:var(--primary);font-weight:700}
.bubble em{color:var(--accent);font-style:italic}
.bubble code{background:rgba(0,0,0,.3);border:1px solid var(--border);
  border-radius:4px;padding:2px 6px;font-size:.82em;font-family:'Fira Code',monospace;color:var(--primary)}
.bubble pre{background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;font-size:.8em}
.bubble pre code{background:none;border:none;padding:0;color:#a0aec0}
.bubble ul,.bubble ol{padding-left:24px;margin:10px 0}
.bubble li{margin:6px 0;color:#eef2ff}
.bubble blockquote{border-left:3px solid var(--primary);padding-left:12px;margin:10px 0;
  color:rgba(238,242,255,.8);font-style:italic}
.bubble a{color:var(--primary);text-decoration:underline}
.bubble a:hover{opacity:.8}

/* Images générées */
.bubble img{max-width:100%;border-radius:10px;margin-top:8px;display:block}
.img-loading{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--primary)}
.img-spinner{width:16px;height:16px;border:2px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px var(--primary),0 0 16px var(--primary)}50%{box-shadow:0 0 0 2px var(--primary),0 0 24px var(--primary)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Techno monospace */
body.techno .bubble,body.techno #inp{font-family:'Fira Code',monospace;font-size:.82rem}
</style>
</head>
<body class="orionis">

<div id="app">
  <header>
    <div class="logo"></div>
    <div class="brand">
      <span class="brand-name" id="brand-name">ORIONIS</span>
      <span class="brand-desc" id="brand-desc">AI Assistant</span>
    </div>
    <span class="studio">2.0 STUDIOS</span>
    <select class="model-select" id="model-select">
      <option value="orionis">Orionis AI</option>
      <option value="techno">Techno 2.0</option>
      <option value="activites">Tarbes-AI</option>
      <option value="imaginary">Imaginary</option>
    </select>
    <div class="status">
      <div class="dot"></div>
      <span id="status">En ligne</span>
    </div>
  </header>

  <div id="msgs"></div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="inp" rows="1" placeholder="Posez votre question..."></textarea>
      <button id="send">⬆</button>
    </div>
    <div class="input-footer">Orionis AI · Powered by 2.0 Studios & Frame.imc</div>
  </div>
</div>

<script>
// Pollinations a migré vers gen.pollinations.ai. Sa doc actuelle dit que toutes les
// requêtes de génération demandent une clé — mais un tier "Anonymous" limité (via un
// simple paramètre referrer, pas une vraie clé secrète) existait. On tente ça en premier.
// Endpoints legacy Pollinations : confirmés fonctionnels SANS clé API (voir CodePen de test).
// Le point bloquant précédent était le paramètre model=gemini (modèle inexistant -> 404).
const GEMINI_BASE = 'https://text.pollinations.ai';
const IMG_BASE = 'https://image.pollinations.ai/prompt';

const THEMES = {
  orionis: {
    name: 'ORIONIS', desc: 'AI Assistant',
    placeholder: 'Posez votre question...',
    system: 'Tu es Orionis AI, un assistant intelligent et sympa développé par 2.0 Studios et FouchetAI. Tu es curieux, enthousiaste, et tu aides sur tous les sujets. Tu réponds toujours en français sauf si on te parle dans une autre langue.',
    suggestions: [
      'Explique-moi comment fonctionne ChatGPT',
      'Donne-moi une recette rapide et délicieuse',
      'Aide-moi à apprendre Python',
      'Raconte-moi une blague intelligente',
      'Crée-moi un plan de voyage de 5 jours',
      'Comment faire un site web ?'
    ]
  },
  techno: {
    name: 'TECHNO', desc: 'Dev Specialist',
    placeholder: 'Décris ton problème de code...',
    system: 'Tu es Techno 2.0, un développeur expert créé par 2.0 Studios et FouchetAI. Tu es direct, tu parles code sans blabla. Tu maîtrises Python, JavaScript, React, Docker, SQL, et plus. Tu donnes du code fonctionnel concis. Tu réponds en français.',
    suggestions: [
      'Apprendre Python de zéro',
      'React vs Vue en 2025',
      'Les commandes Git essentielles',
      'Comment faire une API REST',
      'Explique Docker simplement',
      'Clean code : les règles essentielles'
    ]
  },
  activites: {
    name: 'Tarbes AI', desc: 'Recettes, activité, demande moi!!',
    placeholder: 'Recette, balade, activité fun...',
    system: 'Tu es l\'expert en balades, activités sympas et recettes délicieuses créé par 2.0 Studios et FouchetAI. Tu proposes des idées créatives pour s\'amuser, des recettes du monde entier, et des randos sympathiques. Tu es enthousiaste et inspirant. Tu réponds en français.',
    suggestions: [
      'Une recette rapide pour ce soir',
      'Idée de balade sympas',
      'Activité amusante entre amis',
      'Dessert facile et impressionnant',
      'Recette d\'un autre pays',
      'Que faire ce weekend ?'
    ]
  },
  imaginary: {
    name: 'IMAGINARY', desc: 'Image Generator',
    placeholder: 'Décris l\'image que tu veux...',
    system: '',
    isImage: true,
    suggestions: [
      'Paysage cyberpunk futuriste',
      'Chat astronaute sur la lune',
      'Forêt magique bioluminescente',
      'Dragon fait de lumière néon',
      'Ville flottante dans les nuages',
      'Robot humanoide réaliste'
    ]
  }
};

// STATE
const inp = document.getElementById('inp');
const send = document.getElementById('send');
const msgsEl = document.getElementById('msgs');
const modelSel = document.getElementById('model-select');
let currentTheme = 'orionis';
let busy = false;
let hist = [];

// UTILS
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(t) {
  return t
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${esc(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/__([\s\S]+?)__/g, '<strong>$1</strong>')
    .replace(/_([\s\S]+?)_/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^  - (.+)$/gm, '<li style="margin-left:20px">$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[h|u|o|b|p])/gm, '<p>')
    .replace(/$/gm, '</p>')
    .replace(/<p><\/p>/g, '')
    .replace(/\n/g, '<br>');
}

// RENDER WELCOME
function renderWelcome() {
  const t = THEMES[currentTheme];
  const sugg = [...t.suggestions].sort(() => Math.random() - 0.5).slice(0, 4);
  msgsEl.innerHTML = `
    <div class="welcome">
      <div class="welcome-logo"></div>
      <h2>${t.name}</h2>
      <p>${t.desc}</p>
      <div class="welcome-line">Prêt à vous aider ! 🎯</div>
      <div class="chips">
        ${sugg.map((q, i) => `<div class="chip" data-q="${q.replace(/"/g, '&quot;')}">${q}</div>`).join('')}
      </div>
    </div>`;
  msgsEl.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      inp.value = c.dataset.q;
      send.click();
    });
  });
}

// SWITCH THEME
function switchTheme(theme) {
  currentTheme = theme;
  const t = THEMES[theme];
  document.body.className = theme;
  document.getElementById('brand-name').textContent = t.name;
  document.getElementById('brand-desc').textContent = t.desc;
  inp.placeholder = t.placeholder;
  hist = [];
  busy = false;
  renderWelcome();
}

modelSel.addEventListener('change', (e) => switchTheme(e.target.value));

// ADD MESSAGE
function addMsg(role, text) {
  const w = document.querySelector('.welcome');
  if (w) w.remove();
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'ai' ? '⚡' : '👤';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = fmt(text);
  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

// THINKING ANIMATION
function addThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'thinking-msg';
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = '⚡';
  const bubble = document.createElement('div');
  bubble.className = 'thinking';
  const states = ['thinking', 'analyzing', 'formatting', 'responding'];
  const state = states[Math.floor(Math.random() * states.length)];
  bubble.innerHTML = `${state}... <span class="think-dot"></span><span class="think-dot"></span><span class="think-dot"></span>`;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return wrap;
}

// POLLINATIONS CALL (tentative sans clé, via le paramètre referrer du tier Anonymous)
async function callGemini(messages) {
  const lastUserMsg = messages[messages.length - 1].content;
  const url = new URL(`${GEMINI_BASE}/${encodeURIComponent(lastUserMsg)}`);
  url.searchParams.set('system', THEMES[currentTheme].system);
  url.searchParams.set('seed', Math.floor(Math.random() * 1000000));
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error('API Error: ' + res.status);
  return await res.text();
}

function getImageUrl(prompt) {
  const url = new URL(`${IMG_BASE}/${encodeURIComponent(prompt)}`);
  url.searchParams.set('width', '1024');
  url.searchParams.set('height', '1024');
  url.searchParams.set('seed', Math.floor(Math.random() * 1000000));
  url.searchParams.set('nologo', 'true');
  return url.toString();
}

// SMOOTH TYPEOUT
async function typeOut(el, text) {
  el.innerHTML = '';
  const words = text.split(/(\s+)/);
  for (let i = 0; i < words.length; i++) {
    el.innerHTML += fmt(words[i]);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    await new Promise(r => setTimeout(r, 20 + Math.random() * 20));
  }
  el.innerHTML = fmt(text);
}

// SEND
async function handleSend() {
  const txt = inp.value.trim();
  if (!txt || busy) return;
  busy = true;
  send.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  addMsg('user', txt);
  document.getElementById('status').textContent = 'Traitement...';
  const thinkMsg = addThinking();

  if (THEMES[currentTheme].isImage) {
    try {
      const imgUrl = getImageUrl(txt);
      const img = new Image();
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = rej;
        img.src = imgUrl;
      });
      thinkMsg.remove();
      addMsg('ai', `<img src="${imgUrl}" />`);
    } catch (e) {
      thinkMsg.remove();
      addMsg('ai', `❌ Impossible de générer l'image. Essayez une autre description.`);
    }
  } else {
    try {
      hist.push({ role: 'user', content: txt });
      const fullText = await callGemini([
        { role: 'system', content: THEMES[currentTheme].system },
        ...hist
      ]);
      hist.push({ role: 'assistant', content: fullText });
      thinkMsg.remove();
      addMsg('ai', fullText);
    } catch (e) {
      thinkMsg.remove();
      addMsg('ai', `❌ Erreur: ${e.message}`);
    }
  }

  document.getElementById('status').textContent = 'En ligne';
  busy = false;
  send.disabled = false;
  inp.focus();
}

send.addEventListener('click', handleSend);
inp.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// Init
renderWelcome();
</script>
</body>
</html>
